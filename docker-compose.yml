services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data       # SQLite memory persists across restarts
      - ./outputs:/app/outputs # Saved research notes
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama  # Model weights persist across restarts
    # GPU passthrough — remove the entire 'deploy' block if you have no NVIDIA GPU
    # (the app will still work, just slower on CPU)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
